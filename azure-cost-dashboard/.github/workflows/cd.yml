name: CD — Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

env:
  NODE_VERSION: '20'
  AZURE_WEBAPP_BACKEND_NAME: ${{ vars.AZURE_WEBAPP_BACKEND_NAME }}
  AZURE_WEBAPP_FRONTEND_NAME: ${{ vars.AZURE_WEBAPP_FRONTEND_NAME }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  REGISTRY: ${{ vars.AZURE_CONTAINER_REGISTRY }}.azurecr.io

jobs:
  # ─── Build Backend ───────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: azure-cost-dashboard/backend
    outputs:
      artifact-path: ${{ steps.upload.outputs.artifact-path }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: azure-cost-dashboard/backend/package-lock.json

      - run: npm ci --production=false
      - run: npx tsc --noEmit
      - run: npm run build          # tsc output to dist/

      - name: Package artifact
        run: |
          cp package.json package-lock.json dist/
          cd dist && npm ci --omit=dev

      - name: Upload backend artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: azure-cost-dashboard/backend/dist
          retention-days: 1

  # ─── Build Frontend ──────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: azure-cost-dashboard/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: azure-cost-dashboard/frontend/package-lock.json

      - run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_AZURE_CLIENT_ID: ${{ secrets.VITE_AZURE_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ secrets.VITE_AZURE_TENANT_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: azure-cost-dashboard/frontend/dist
          retention-days: 1

  # ─── Deploy Backend ──────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Azure App Service
    needs: [build-backend]
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: backend-dist

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_BACKEND_NAME }}
          package: backend-dist

  # ─── Deploy Frontend ─────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Azure Static Web App / App Service
    needs: [build-frontend]
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_FRONTEND_NAME }}
          package: frontend-dist

  # ─── Post-deploy health check ────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Health check — backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ env.AZURE_WEBAPP_BACKEND_NAME }}.azurewebsites.net/api/v1/health")
          echo "Backend health status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Health check — frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ env.AZURE_WEBAPP_FRONTEND_NAME }}.azurewebsites.net/")
          echo "Frontend health status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
